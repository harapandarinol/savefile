<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isi Workspace - Simplikit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3003/3003222.png">
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">

  <main class="flex-1 flex flex-col h-full overflow-hidden">
    
    <header class="bg-white p-4 flex justify-between items-center border-b shadow-sm">
      <div class="flex items-center gap-3">
        <a href="dashboard.html" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors text-slate-600">
          <i class='bx bx-arrow-back text-xl'></i>
        </a>
        <div>
          <h1 class="text-lg md:text-xl font-bold text-slate-800" id="ws-name">Memuat...</h1>
          <p class="text-xs text-slate-500">File Manager</p>
        </div>
      </div>
      <button onclick="document.getElementById('f').click()" class="hidden md:flex bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl items-center gap-2 shadow-sm transition-all">
        <i class='bx bx-cloud-upload text-xl'></i> Upload File
      </button>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-24">
      
      <div class="md:hidden mb-6 border-2 border-dashed border-indigo-200 bg-indigo-50/50 hover:bg-indigo-50 rounded-2xl p-6 text-center cursor-pointer transition-colors" onclick="document.getElementById('f').click()">
        <i class='bx bx-cloud-upload text-4xl text-indigo-500 mb-2'></i>
        <p class="text-sm font-medium text-indigo-700">Ketuk untuk upload file</p>
        <p class="text-xs text-slate-500 mt-1">Maksimal bergantung pada Google Drive</p>
      </div>

      <input type="file" id="f" hidden>

      <div id="files" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        </div>
    </div>

  </main>

  <script src="js/api.js"></script>
  <script>
    if(!localStorage.workspace) window.location = "dashboard.html";
    
    document.getElementById("ws-name").innerText = localStorage.workspaceName || "Workspace";
    const f = document.getElementById("f");
    const filesContainer = document.getElementById("files");

    f.addEventListener("change", upload);

    async function upload(){
      const file = f.files[0];
      if (!file) return;
      
      // Loading State (Bisa diperbagus dengan progress bar nanti)
      filesContainer.innerHTML = `<div class="col-span-full text-center py-10"><i class='bx bx-loader-alt bx-spin text-3xl text-indigo-600'></i><p class="mt-2 text-slate-500">Mengupload ${file.name}...</p></div>` + filesContainer.innerHTML;

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(",")[1];

        const res = await api({
          action: "uploadFile",
          workspace: localStorage.workspace,
          file: base64,
          name: file.name,
          type: file.type
        });

        if(res && res.status !== "success") {
          alert("Gagal upload: " + res.message);
        }
        
        load(); // Muat ulang setelah upload
      };
      reader.readAsDataURL(file);
    }

    async function load() {
      filesContainer.innerHTML = "<p class='col-span-full text-center text-slate-500 py-10'><i class='bx bx-loader-alt bx-spin text-3xl'></i><br>Memuat file...</p>";
      
      const res = await api({
        action: "listFiles",
        workspace: wsId
      });

      if(res && res.status === "success") {
        if(res.data.length === 0) {
          filesContainer.innerHTML = "<p class='col-span-full text-center text-slate-500 py-10'>Belum ada file.</p>";
          return;
        }

        let html = "";
        res.data.forEach(file => {
          let icon = "bxs-file text-slate-400";
          if(file.name.match(/\.(jpg|jpeg|png|gif)$/i)) icon = "bx-image text-blue-500";
          else if(file.name.match(/\.(pdf)$/i)) icon = "bxs-file-pdf text-red-500";
          else if(file.name.match(/\.(zip|rar)$/i)) icon = "bxs-file-archive text-yellow-500";

          // UBAH ONCLICK: Dari window.open() menjadi openPreview()
          html += `
          <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow cursor-pointer flex flex-col items-center text-center group" onclick="openPreview('${file.url}', '${file.name}')">
            <div class="h-16 w-16 bg-slate-50 rounded-lg flex items-center justify-center mb-3 group-hover:bg-indigo-50 transition-colors">
              <i class='bx ${icon} text-4xl group-hover:text-indigo-500'></i>
            </div>
            <span class="text-sm font-medium text-slate-700 w-full truncate px-1">${file.name}</span>
            <span class="text-[10px] text-slate-400 mt-1 w-full truncate hidden md:block">${new Date(file.date).toLocaleDateString('id-ID')}</span>
          </div>`;
        });
        filesContainer.innerHTML = html;
      } else {
        filesContainer.innerHTML = "<p class='col-span-full text-center text-red-500'>Gagal memuat file.</p>";
      }
    }

    // --- FUNGSI PREVIEW ---
    function openPreview(url, fileName) {
      const modal = document.getElementById("preview-modal");
      const iframe = document.getElementById("preview-iframe");
      
      // Google Drive default URL is .../view?usp=drivesdk
      // Untuk Iframe/Preview, kita replace "/view" menjadi "/preview"
      const previewUrl = url.replace(/\/view.*$/, '/preview');
      
      document.getElementById("preview-title").innerText = fileName;
      document.getElementById("preview-download").href = url; // Link asli untuk download
      iframe.src = previewUrl;
      
      modal.classList.remove("hidden");
      setTimeout(() => modal.classList.remove("opacity-0"), 10);
    }

    function closePreview() {
      const modal = document.getElementById("preview-modal");
      modal.classList.add("opacity-0");
      setTimeout(() => {
        modal.classList.add("hidden");
        document.getElementById("preview-iframe").src = ""; // Clear iframe agar audio/video berhenti
      }, 300);
    }

    load();
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker terdaftar!', reg.scope))
        .catch(err => console.log('Gagal mendaftar Service Worker', err));
    });
  }
</script>

  <div id="preview-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex-col items-center justify-center backdrop-blur-md opacity-0 transition-opacity duration-300">
    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent">
      <h3 id="preview-title" class="text-white font-medium truncate max-w-[80%]">Preview Document</h3>
      <div class="flex gap-2">
        <a id="preview-download" href="#" target="_blank" class="p-2 bg-white/20 hover:bg-white/30 text-white rounded-lg transition-colors" title="Buka di Tab Baru / Download">
          <i class='bx bx-link-external text-xl'></i>
        </a>
        <button onclick="closePreview()" class="p-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors" title="Tutup">
          <i class='bx bx-x text-xl'></i>
        </button>
      </div>
    </div>
    
    <div class="w-full h-full pt-16 pb-4 px-4 flex items-center justify-center">
      <iframe id="preview-iframe" class="w-full max-w-5xl h-full bg-white rounded-xl shadow-2xl" src="" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>
  
</body>
</html>
