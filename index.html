<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3003/3003222.png">
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-8 rounded-2xl w-96 shadow-lg">

<h2 class="text-2xl font-bold mb-6 text-center">Login Simplikit</h2>

<input id="email" placeholder="Email"
class="w-full border p-2 rounded mb-3">

<input id="password" type="password" placeholder="Password"
class="w-full border p-2 rounded mb-4">

<button onclick="login()"
class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
Login
</button>

<p id="error" class="text-red-500 mt-3 text-sm text-center"></p>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker terdaftar!', reg.scope))
        .catch(err => console.log('Gagal mendaftar Service Worker', err));
    });
  }
</script>

</body>
</html>
