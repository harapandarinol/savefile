<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Simplikit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
</head>
<body class="flex items-center justify-center h-screen bg-slate-50 p-4">

  <div class="bg-white p-8 md:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-md border border-slate-100">
    
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl mb-4">
        <i class='bx bxs-box text-4xl'></i>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Selamat Datang</h2>
      <p class="text-slate-500 text-sm mt-1">Masuk ke Simplikit Workspace</p>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class='bx bx-envelope text-slate-400 text-lg'></i>
          </div>
          <input id="email" type="email" placeholder="nama@email.com" class="w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition-all">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class='bx bx-lock-alt text-slate-400 text-lg'></i>
          </div>
          <input id="password" type="password" placeholder="••••••••" class="w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition-all" onkeypress="handleEnter(event)">
        </div>
      </div>

      <div id="error-container" class="hidden bg-red-50 p-3 rounded-xl border border-red-100 flex items-start gap-2 transition-all">
        <i class='bx bx-error-circle text-red-500 mt-0.5'></i>
        <p id="error" class="text-red-600 text-sm font-medium"></p>
      </div>

      <button id="login-btn" onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 transition-all duration-300 font-medium flex items-center justify-center gap-2 mt-2 shadow-lg shadow-indigo-200">
        <span id="btn-text">Masuk</span>
        <i id="btn-icon" class='bx bx-right-arrow-alt text-xl'></i>
      </button>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker terdaftar!', reg.scope))
          .catch(err => console.log('Gagal mendaftar Service Worker', err));
      });
    }
  </script>

</body>
</html>
