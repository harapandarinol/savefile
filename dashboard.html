<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Simplikit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">

  <aside class="hidden md:flex flex-col w-64 bg-white border-r shadow-sm">
    <div class="p-6 border-b flex items-center gap-2 text-indigo-600">
      <i class='bx bxs-box text-3xl'></i>
      <span class="text-xl font-bold">Simplikit</span>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 p-3 bg-indigo-50 text-indigo-600 rounded-xl font-medium">
        <i class='bx bxs-dashboard text-xl'></i> Dashboard
      </a>
    </nav>
    <div class="p-4 border-t">
      <button onclick="logout()" class="flex items-center gap-3 p-3 w-full text-left text-slate-500 hover:bg-red-50 hover:text-red-600 rounded-xl transition-colors">
        <i class='bx bx-log-out text-xl'></i> Keluar
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col h-full overflow-hidden relative">
    <header class="md:hidden bg-white p-4 flex items-center gap-2 border-b text-indigo-600">
      <i class='bx bxs-box text-2xl'></i>
      <span class="text-lg font-bold">Simplikit</span>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-2xl font-bold text-slate-800">Workspace Saya</h1>
          <p class="text-sm text-slate-500">Kelola dan simpan file dalam workspace.</p>
        </div>
        <button onclick="createWorkspace()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg shadow-indigo-200 transition-all">
          <i class='bx bx-plus text-xl'></i> <span class="hidden sm:inline">Buat Baru</span>
        </button>
      </div>

      <div id="workspaces" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>
    </div>
  </main>

  <nav class="md:hidden fixed bottom-0 w-full bg-white border-t flex justify-around p-3 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
    <a href="dashboard.html" class="flex flex-col items-center text-indigo-600">
      <i class='bx bxs-dashboard text-2xl'></i>
      <span class="text-[10px] font-medium mt-1">Home</span>
    </a>
    <button onclick="createWorkspace()" class="flex flex-col items-center text-slate-400 hover:text-indigo-600">
      <i class='bx bx-plus-circle text-2xl'></i>
      <span class="text-[10px] font-medium mt-1">Buat</span>
    </button>
    <button onclick="logout()" class="flex flex-col items-center text-slate-400 hover:text-red-500">
      <i class='bx bx-log-out text-2xl'></i>
      <span class="text-[10px] font-medium mt-1">Keluar</span>
    </button>
  </nav>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    function logout() {
      localStorage.removeItem("token");
      window.location = "index.html";
    }
  </script>
</body>
</html>
